name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
# Different branches and PRs still run independently.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Install Playwright browsers and system deps
        run: npx playwright install --with-deps

      - name: Run tests
        run: ./test.sh

      - name: Generate lcov report
        run: npx nyc report --reporter=lcov --report-dir=coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
